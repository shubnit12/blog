server {
    listen 80;
    server_name blog.shubnit.com;
    return 301 https://blog.shubnit.com$request_uri;
}

server {
    listen 443 ssl;
    server_name blog.shubnit.com;

    ssl_certificate /etc/letsencrypt/live/shubnit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shubnit.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
